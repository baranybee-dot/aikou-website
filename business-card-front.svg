<?xml version="1.0" encoding="UTF-8"?>
<!--
  AIKOU Business Card — FRONT
  Size : 96 × 56 mm  (standard credit-card format)
  Bleed: none — add 1–2 mm bleed in Illustrator before sending to print
  Color: RGB — switch Document Color Mode to CMYK in Illustrator (File › Document Color Mode › CMYK)
  Fonts: DM Sans (600), Space Mono — install from Google Fonts if not present
  Layers (5): Background · Glow · Logo · Identity · Contact
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  xmlns:i="http://ns.adobe.com/AdobeIllustrator/10.0/"
  version="1.1"
  width="96mm" height="56mm"
  viewBox="0 0 96 56"
  xml:space="preserve">

  <defs>
    <!-- 4 mm grid tile -->
    <pattern id="grid" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-opacity="0.013" stroke-width="0.08"/>
      <line x1="0" y1="0" x2="0" y2="4" stroke="#ffffff" stroke-opacity="0.013" stroke-width="0.08"/>
    </pattern>
    <!-- Rounded-rect clip (keeps everything inside the card) -->
    <clipPath id="cardClip">
      <rect width="96" height="56" rx="3" ry="3"/>
    </clipPath>
    <!-- Cyan glow — top-right corner -->
    <radialGradient id="glowGrad" cx="76" cy="10" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00c8ff" stop-opacity="0.055"/>
      <stop offset="65%"  stop-color="#00c8ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ═══════════════════════════════════════════
       LAYER 1 · Background
       Card fill + subtle border + grid texture
  ═══════════════════════════════════════════ -->
  <g id="Background" i:layer="yes">
    <rect width="96" height="56" rx="3" ry="3" fill="#090909"/>
    <rect width="96" height="56" rx="3" ry="3"
          fill="none" stroke="#1e1e1e" stroke-width="0.3"/>
    <rect width="96" height="56" rx="3" ry="3"
          fill="url(#grid)" clip-path="url(#cardClip)"/>
  </g>

  <!-- ═══════════════════════════════════════════
       LAYER 2 · Glow
       Radial cyan haze, clipped to card shape
  ═══════════════════════════════════════════ -->
  <g id="Glow" i:layer="yes">
    <rect width="96" height="56" rx="3" ry="3"
          fill="url(#glowGrad)" clip-path="url(#cardClip)"/>
  </g>

  <!-- ═══════════════════════════════════════════
       LAYER 3 · Logo
       AIKOU logo-02 (emblem + wordmark)
       Scaled to 8 mm height, placed top-left at (7, 6)
       Source viewBox: 0 0 440 140  →  scale = 8/140 ≈ 0.05714
  ═══════════════════════════════════════════ -->
  <g id="Logo" i:layer="yes">
    <g transform="translate(7,6) scale(0.05714)">

      <!-- Emblem: cyan rounded square -->
      <path fill="#00C8FF"
        d="M63,22h54c11.6,0,21,9.4,21,21v54c0,11.6-9.4,21-21,21H63
           c-11.6,0-21-9.4-21-21V43C42,31.4,51.4,22,63,22z"/>
      <!-- Left chevron set — dark teal -->
      <polygon fill="#005A7A" points="63,46 72,46 90,67 81,67"/>
      <polygon fill="#005A7A" points="63,94 72,94 90,73 81,73"/>
      <rect    fill="#005A7A" x="81" y="67" width="9" height="6"/>
      <!-- Right chevron set — black (invisible on dark bg, visible on cyan emblem) -->
      <polygon fill="#000000" points="90,46 99,46 117,67 108,67"/>
      <polygon fill="#000000" points="90,94 99,94 117,73 108,73"/>
      <rect    fill="#000000" x="108" y="67" width="9" height="6"/>

      <!-- A -->
      <path fill="#FFFFFF"
        d="M162.3,95.5l12.2-51.1h18.1l12.1,51.1h-10l-2.5-11h-17.4l-2.5,11H162.3z
           M176.9,75.4h13.2l-5.9-26.1h-1.3L176.9,75.4z"/>
      <!-- I -->
      <path fill="#FFFFFF"
        d="M216.6,95.5v-9.2h12.3V53.6h-12.3v-9.2h34.1v9.2h-12.3v32.7h12.3v9.2H216.6z"/>
      <!-- K -->
      <path fill="#FFFFFF"
        d="M265.1,95.5v-51h9.6v21h2.1l13.5-21h10.9v0.4l-15.7,24.5v1.3
           l16.6,24.5v0.4h-11.3l-13.9-21h-2.2v21C274.7,95.6,265.1,95.6,265.1,95.5z"/>
      <!-- O — cyan -->
      <path fill="#00C8FF"
        d="M329,96.7c-5.9,0-10.5-1.8-13.8-5.4s-5-8.8-5-15.6V64.3
           c0-6.6,1.7-11.7,5-15.4c3.4-3.7,8-5.5,13.8-5.5s10.5,1.8,13.8,5.5
           c3.4,3.7,5,8.8,5,15.4v11.4c0,6.8-1.7,12-5,15.6S334.9,96.7,329,96.7z
           M329,87.8c3.5,0,5.9-1.1,7.2-3.2c1.3-2.1,2-4.9,2-8.3V63.6
           c0-2.1-0.3-4.1-1-5.9c-0.6-1.8-1.6-3.1-3-4.2c-1.3-1-3.1-1.5-5.3-1.5
           c-2.2,0-4,0.5-5.3,1.5c-1.4,1-2.4,2.4-3,4.2s-0.9,3.7-0.9,5.9v12.6
           c0,3.4,0.7,6.2,2,8.3C323.1,86.8,325.5,87.8,329,87.8z"/>
      <!-- U -->
      <path fill="#FFFFFF"
        d="M378.7,96.7c-6,0-10.6-1.7-13.7-5s-4.7-7.9-4.7-13.7V44.5h9.6v33.4
           c0,3,0.7,5.3,2.2,7c1.4,1.7,3.6,2.6,6.6,2.6s5.2-0.9,6.6-2.6s2.1-4.1,2.1-7V44.5
           h9.6v33.4c0,5.8-1.5,10.4-4.6,13.7C389.4,94.9,384.8,96.7,378.7,96.7z"/>

    </g>
  </g>

  <!-- ═══════════════════════════════════════════
       LAYER 4 · Identity
       Name + job title, top-right
  ═══════════════════════════════════════════ -->
  <g id="Identity" i:layer="yes">
    <text
      x="89" y="11"
      font-family="'DM Sans', 'DM-Sans', sans-serif"
      font-size="5"
      font-weight="600"
      fill="#FFFFFF"
      text-anchor="end"
      letter-spacing="-0.05">Viktor Tóth</text>
    <text
      x="89" y="14.5"
      font-family="'Space Mono', 'SpaceMono', monospace"
      font-size="2"
      fill="#00C8FF"
      text-anchor="end"
      letter-spacing="0.4">CEO</text>
  </g>

  <!-- ═══════════════════════════════════════════
       LAYER 5 · Contact
       Three rows: website · phone · email
       Icon = 3.5 × 3.5 mm (scaled from 24 × 24 viewBox)
       Left edge x = 7 mm;  text starts at x = 13 mm
  ═══════════════════════════════════════════ -->
  <g id="Contact" i:layer="yes">

    <!-- ── Row 1 · Globe / Website  (top of icon at y = 35.5 mm) ── -->
    <g transform="translate(7,35.5)">
      <g transform="scale(0.14583)"
         fill="none" stroke="#00C8FF" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10
                 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </g>
      <text x="6" y="1.75"
        font-family="'Space Mono', 'SpaceMono', monospace"
        font-size="2.2" fill="#00C8FF" letter-spacing="0.09"
        dominant-baseline="middle">www.aikou.tech</text>
    </g>

    <!-- ── Row 2 · Phone  (top of icon at y = 41 mm) ── -->
    <g transform="translate(7,41)">
      <g transform="scale(0.14583)"
         fill="none" stroke="#00C8FF" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2
                 19.79 19.79 0 0 1-8.63-3.07
                 A19.5 19.5 0 0 1 4.69 12
                 19.79 19.79 0 0 1 1.58 3.2
                 A2 2 0 0 1 3.55 1h3a2 2 0 0 1 2 1.72
                 c.127.96.361 1.903.7 2.81
                 a2 2 0 0 1-.45 2.11L7.91 8.69
                 a16 16 0 0 0 5.55 5.55l.86-.86
                 a2 2 0 0 1 2.11-.45
                 c.907.339 1.85.573 2.81.7
                 A2 2 0 0 1 22 16.92z"/>
      </g>
      <text x="6" y="1.75"
        font-family="'Space Mono', 'SpaceMono', monospace"
        font-size="2.2" fill="#00C8FF" letter-spacing="0.09"
        dominant-baseline="middle">+36 30 788 5547</text>
    </g>

    <!-- ── Row 3 · Email  (top of icon at y = 46.5 mm) ── -->
    <g transform="translate(7,46.5)">
      <g transform="scale(0.14583)"
         fill="none" stroke="#00C8FF" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12
                 c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6
                 c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </g>
      <text x="6" y="1.75"
        font-family="'Space Mono', 'SpaceMono', monospace"
        font-size="2.2" fill="#00C8FF" letter-spacing="0.09"
        dominant-baseline="middle">info@aikou.tech</text>
    </g>

  </g>

</svg>
